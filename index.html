<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#101827" />
  <title>띵보님 피하기</title>
  <style>
    /* 기본 레이아웃 */
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --yellow: #facc15;
      --blue: #2563eb;
      --dark: #0f172a;
      --red: #ef4444;
      --app-height: 100dvh;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      background: #020617;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #app {
      position: relative;
      width: min(100vw, 520px);
      height: var(--app-height);
      min-height: 320px;
      max-width: 520px;
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 4%, rgba(250, 204, 21, 0.32), transparent 28%),
        radial-gradient(circle at 15% 86%, rgba(34, 197, 94, 0.22), transparent 26%),
        linear-gradient(180deg, #1e3a8a 0%, #0f172a 58%, #020617 100%);
      box-shadow: 0 0 46px rgba(0,0,0,.42);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    /* 게임 HUD와 조작 버튼 */
    .hud {
      position: absolute;
      top: calc(10px + var(--safe-top));
      left: 12px;
      right: 12px;
      z-index: 4;
      pointer-events: none;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .panel {
      color: white;
      background: rgba(15, 23, 42, .56);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 20px;
      padding: 10px 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,.20);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .title-small {
      font-size: 12px;
      font-weight: 900;
      opacity: .92;
      margin-bottom: 4px;
      letter-spacing: -.02em;
    }

    .time-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-weight: 1000;
      letter-spacing: -.04em;
    }

    #timeText, #scoreText {
      font-size: clamp(28px, 8vw, 42px);
      line-height: .95;
      font-variant-numeric: tabular-nums;
    }

    .score-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-weight: 1000;
      letter-spacing: -.04em;
    }

    .score-panel {
      text-align: right;
    }

    .unit {
      font-size: 14px;
      opacity: .86;
    }

    .status-row {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 31px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 1000;
      color: #111827;
      background: rgba(250, 204, 21, .94);
      box-shadow: 0 10px 20px rgba(0,0,0,.16);
    }

    .pill.blue { background: rgba(147, 197, 253, .94); }
    .pill.red { background: rgba(252, 165, 165, .94); }
    .pill.purple { background: rgba(216, 180, 254, .94); }

    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 12px 16px calc(14px + max(var(--safe-bottom), 8px));
      pointer-events: none;
    }

    .control-btn {
      pointer-events: auto;
      height: 74px;
      border: 0;
      border-radius: 27px;
      color: white;
      font-size: 34px;
      font-weight: 1000;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 30px rgba(0,0,0,.23), inset 0 1px 0 rgba(255,255,255,.16);
      touch-action: none;
    }

    .control-btn:active,
    .control-btn.is-pressed {
      transform: translateY(2px) scale(.99);
      background: rgba(250,204,21,.34);
    }

    /* 시작·게임오버 화면 */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(2, 6, 23, .34);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .overlay.is-hidden { display: none; }

    .card {
      position: relative;
      width: min(92vw, 420px);
      max-height: calc(var(--app-height) - 32px);
      overflow-y: auto;
      overscroll-behavior: contain;
      max-height: calc(var(--app-height) - 24px);
      overflow-y: auto;
      overscroll-behavior: contain;
      touch-action: pan-y;
      border-radius: 32px;
      padding: 24px 20px 20px;
      color: #111827;
      background: rgba(255,255,255,.91);
      border: 1px solid rgba(255,255,255,.76);
      box-shadow: 0 24px 70px rgba(0,0,0,.34);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 1000;
      color: #78350f;
      background: #fef3c7;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 10vw, 48px);
      line-height: 1;
      letter-spacing: -.08em;
    }

    .subtitle {
      margin: 12px 0 0;
      color: #475569;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 800;
      word-break: keep-all;
    }

    .version-badge {
      position: absolute;
      right: 12px;
      bottom: 9px;
      font-size: 10px;
      font-weight: 900;
      color: rgba(100, 116, 139, .72);
      letter-spacing: -.02em;
      pointer-events: none;
      user-select: none;
    }

    .tips {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin: 16px 0 18px;
      text-align: left;
    }

    .tip {
      border-radius: 18px;
      padding: 10px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 12px;
      font-weight: 850;
      color: #334155;
      line-height: 1.3;
    }

    .primary-btn,
    .secondary-btn {
      position: relative;
      z-index: 20;
      width: 100%;
      border: 0;
      border-radius: 22px;
      padding: 15px 18px;
      font-size: 18px;
      font-weight: 1000;
      cursor: pointer;
      touch-action: manipulation;
    }

    .primary-btn {
      color: #111827;
      background: linear-gradient(180deg, #fde047, #facc15);
      box-shadow: 0 12px 0 #b45309, 0 18px 30px rgba(180,83,9,.25);
    }

    .primary-btn:active { transform: translateY(4px); box-shadow: 0 8px 0 #b45309, 0 12px 22px rgba(180,83,9,.22); }

    .secondary-btn {
      margin-top: 10px;
      color: white;
      background: #0f172a;
    }

    #leaderboardBtn {
      margin-top: 18px;
    }

    /* 결과와 랭킹 */
    .result-box {
      margin: 16px 0 12px;
      padding: 14px;
      border-radius: 22px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .result-stat {
      padding: 11px 8px;
      border-radius: 16px;
      background: white;
      border: 1px solid #e5e7eb;
    }

    .label {
      font-size: 12px;
      color: #64748b;
      font-weight: 850;
    }

    .value {
      margin-top: 3px;
      font-size: clamp(18px, 5.2vw, 24px);
      font-weight: 1000;
      letter-spacing: -.05em;
      font-variant-numeric: tabular-nums;
    }

    .ranking {
      margin-top: 10px;
      text-align: left;
      display: grid;
      gap: 5px;
    }

    .rank-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 12px;
      background: white;
      font-size: 13px;
      font-weight: 900;
      color: #334155;
    }

    .rank-line span:last-child {
      text-align: right;
    }

    .name-entry {
      margin-top: 10px;
      padding: 12px;
      border-radius: 18px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      display: none;
      gap: 8px;
    }

    .name-entry.show {
      display: grid;
    }

    .name-entry-title {
      font-size: 14px;
      font-weight: 1000;
      color: #9a3412;
    }

    .name-entry-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .name-entry input {
      width: 100%;
      height: 42px;
      border-radius: 14px;
      border: 1px solid #fdba74;
      padding: 0 12px;
      font-size: 16px;
      font-weight: 900;
      outline: none;
      background: white;
      color: #111827;
    }

    .name-entry input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,.18);
    }

    .name-entry button {
      height: 42px;
      border: 0;
      border-radius: 14px;
      padding: 0 14px;
      background: #f97316;
      color: white;
      font-weight: 1000;
      cursor: pointer;
      white-space: nowrap;
    }

    .rank-note {
      margin-top: 8px;
      font-size: 11px;
      color: #64748b;
      font-weight: 800;
      line-height: 1.35;
    }

    .toast {
      position: absolute;
      z-index: 6;
      left: 50%;
      top: 43%;
      transform: translate(-50%, -50%) scale(.96);
      min-width: 180px;
      max-width: 90%;
      padding: 12px 16px;
      border-radius: 999px;
      text-align: center;
      color: #111827;
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: 0 16px 40px rgba(0,0,0,.25);
      font-weight: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* 반응형 화면 보정 */
    @media (min-width: 700px) {
      .controls { padding-left: 24px; padding-right: 24px; }
      .control-btn { height: 70px; }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .hud { top: calc(5px + var(--safe-top)); left: 8px; right: 8px; gap: 5px; }
      .panel { padding: 6px 9px; border-radius: 14px; }
      .title-small { font-size: 10px; margin-bottom: 2px; }
      #timeText, #scoreText { font-size: 24px; }
      .status-row { min-height: 0; gap: 4px; }
      .pill { padding: 4px 7px; font-size: 10px; }
      .controls { gap: 10px; padding: 6px 12px calc(7px + max(var(--safe-bottom), 4px)); }
      .control-btn { height: 54px; border-radius: 20px; font-size: 27px; }
      .overlay { padding: 8px; }
      .card { max-height: calc(var(--app-height) - 16px); padding: 14px 14px 12px; border-radius: 22px; }
      .badge { padding: 5px 8px; margin-bottom: 5px; }
      h1 { font-size: 30px; }
      .subtitle { margin-top: 6px; font-size: 13px; }
      .tips { gap: 5px; margin: 8px 0 10px; }
      .tip { padding: 7px; font-size: 11px; }
      .primary-btn, .secondary-btn { padding: 10px 14px; font-size: 15px; }
      .result-box { margin: 8px 0; padding: 8px; }
      .result-stat { padding: 7px 5px; }
      .ranking { margin-top: 6px; gap: 3px; }
      .rank-line { padding: 4px 7px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div id="app" aria-label="띵보님 피하기 게임">
    <!-- v1.2.6: no wave, progressive fair difficulty -->
    <!-- 게임 화면 -->
    <canvas id="gameCanvas"></canvas>

    <div class="hud" aria-hidden="true">
      <div class="panel">
        <div class="title-small">생존 시간</div>
        <div class="time-line"><span id="timeText">0.0</span><span class="unit">초</span></div>
      </div>
      <div class="panel score-panel">
        <div class="title-small">점수</div>
        <div class="score-line"><span id="scoreText">0</span><span class="unit">점</span></div>
      </div>
      <div id="statusRow" class="status-row"></div>
    </div>

    <div id="toast" class="toast">아슬아슬 +5</div>

    <div class="controls" aria-label="조작 버튼">
      <button id="leftBtn" class="control-btn" type="button" aria-label="왼쪽으로 이동">◀</button>
      <button id="rightBtn" class="control-btn" type="button" aria-label="오른쪽으로 이동">▶</button>
    </div>

    <!-- 시작 화면 -->
    <section id="startOverlay" class="overlay">
      <div class="card">
        <h1>띵보님 피하기</h1>
        <p class="subtitle">32강은 못 갔지만…<br />너는 살아남아라.</p>
        <div class="tips">
          <div class="tip">👈 아래 ◀ ▶ 버튼을 길게 눌러 움직이세요.</div>
          <div class="tip">🔥 아슬아슬 회피를 연속으로 성공하면 COMBO UP!</div>
          <div class="tip">📺 VAR은 한 번 충돌을 무효 처리합니다.</div>
        </div>
        <button id="startBtn" class="primary-btn" type="button">경기 시작</button>
        <button id="leaderboardBtn" class="secondary-btn" type="button">명예의 전당 확인</button>
        <div class="version-badge">v1.2.6</div>
      </div>
    </section>

    <!-- 명예의 전당 화면 -->
    <section id="leaderboardOverlay" class="overlay is-hidden">
      <div class="card">
        <div class="badge">TOP 5</div>
        <h1>명예의 전당</h1>
        <p class="subtitle">친구들의 최고 점수를 확인해보세요.</p>
        <div class="result-box">
          <div id="leaderboardRanking" class="ranking"></div>
          <div id="leaderboardNote" class="rank-note">공유 랭킹 연결 중...</div>
        </div>
        <button id="leaderboardCloseBtn" class="secondary-btn" type="button">돌아가기</button>
      </div>
    </section>

    <!-- 게임오버 화면 -->
    <section id="gameOverOverlay" class="overlay is-hidden">
      <div class="card">
        <div class="badge">휘슬!</div>
        <h1>탈락입니다</h1>
        <p id="endingText" class="subtitle">그래도 이 정도면 잘 버텼습니다.</p>
        <div class="result-box">
          <div class="result-grid">
            <div class="result-stat">
              <div class="label">이번 점수</div>
              <div id="finalScore" class="value">0점</div>
            </div>
            <div class="result-stat">
              <div class="label">이번 생존</div>
              <div id="finalTime" class="value">0.0초</div>
            </div>
            <div class="result-stat">
              <div class="label">최고 점수</div>
              <div id="finalBest" class="value">0점</div>
            </div>
          </div>

          <div id="ranking" class="ranking"></div>
          <div id="nameEntry" class="name-entry">
            <div id="nameEntryTitle" class="name-entry-title">🏆 TOP 5 진입! 이름을 남겨주세요.</div>
            <div class="name-entry-row">
              <input id="playerNameInput" type="text" maxlength="10" inputmode="text" autocomplete="nickname" placeholder="이름 입력" />
              <button id="saveNameBtn" type="button">등록</button>
            </div>
          </div>
          <div id="rankNote" class="rank-note">공유 랭킹 연결 중...</div>
        </div>
        <button id="restartBtn" class="primary-btn" type="button">다시 도전</button>
        <button id="menuBtn" class="secondary-btn" type="button">처음 화면</button>
      </div>
    </section>
  </div>

  <script>
    (() => {
      'use strict';

      // DOM 참조
      const app = document.getElementById('app');
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d', { alpha: true });
      const timeText = document.getElementById('timeText');
      const scoreText = document.getElementById('scoreText');
      const statusRow = document.getElementById('statusRow');
      const toast = document.getElementById('toast');
      const startOverlay = document.getElementById('startOverlay');
      const gameOverOverlay = document.getElementById('gameOverOverlay');
      const startBtn = document.getElementById('startBtn');
      const leaderboardBtn = document.getElementById('leaderboardBtn');
      const leaderboardOverlay = document.getElementById('leaderboardOverlay');
      const leaderboardRankingEl = document.getElementById('leaderboardRanking');
      const leaderboardNote = document.getElementById('leaderboardNote');
      const leaderboardCloseBtn = document.getElementById('leaderboardCloseBtn');
      const restartBtn = document.getElementById('restartBtn');
      const menuBtn = document.getElementById('menuBtn');
      const finalTime = document.getElementById('finalTime');
      const finalScore = document.getElementById('finalScore');
      const finalBest = document.getElementById('finalBest');
      const endingText = document.getElementById('endingText');
      const rankingEl = document.getElementById('ranking');
      const nameEntry = document.getElementById('nameEntry');
      const nameEntryTitle = document.getElementById('nameEntryTitle');
      const playerNameInput = document.getElementById('playerNameInput');
      const saveNameBtn = document.getElementById('saveNameBtn');
      const rankNote = document.getElementById('rankNote');
      const leftBtn = document.getElementById('leftBtn');
      const rightBtn = document.getElementById('rightBtn');

      // 저장 키와 외부 설정
      const STORAGE_KEYS = Object.freeze({
        bestScore: 'ddingboNimAvoidBestScoreV23',
        leaderboard: 'ddingboNimAvoidTop5ScoreV23',
        playerName: 'ddingboNimAvoidPlayerNameV23'
      });
      const ASSET_PATHS = Object.freeze({
        obstacle: 'assets/hmb.png',
        player: 'assets/player.png'
      });
      const FIREBASE_CONFIG = Object.freeze({
        databaseUrl: 'https://ddingbo-rank-default-rtdb.asia-southeast1.firebasedatabase.app',
        boardPath: 'rankings'
      });
      const GAME_STATE = Object.freeze({
        READY: 'ready',
        PLAYING: 'playing',
        GAME_OVER: 'gameover'
      });
      const LEADERBOARD_LIMIT = 5;
      const SERVER_RECORD_LIMIT = 20;
      const COMBO_WINDOW_SECONDS = 2;
      const DPR_LIMIT = 2;

      // 실행 상태
      let W = 0;
      let H = 0;
      let dpr = 1;
      let state = GAME_STATE.READY;
      let lastTime = 0;
      let startTime = 0;
      let hiddenAt = 0;
      let elapsed = 0;
      let score = 0;
      let bonusScore = 0;
      let best = readNumber(STORAGE_KEYS.bestScore, 0);
      let top5 = readTop5();
      let pendingRecord = null;
      let sharedLeaderboardReady = false;
      let sharedLeaderboardError = false;
      let animationId = 0;
      let audioCtx = null;
      let audioReady = false;
      let hmbLoaded = false;
      let hmbFailed = false;
      let nextObstacleAt = 0;
      let nextItemAt = 0;
      let nextBossAt = 38;
      let shake = 0;
      let leftHeld = false;
      let rightHeld = false;
      const keys = new Set();
      let toastTimer = 0;
      let combo = 0;
      let comboExpiresAt = 0;
      let nearCount = 0;
      let lastMilestone = 0;

      // 이미지와 게임 객체
      const hmbImg = new Image();
      hmbImg.onload = () => { hmbLoaded = true; };
      hmbImg.onerror = () => { hmbFailed = true; };
      hmbImg.src = ASSET_PATHS.obstacle;

      const playerImg = new Image();
      let playerLoaded = false;
      let playerFailed = false;
      playerImg.onload = () => { playerLoaded = true; };
      playerImg.onerror = () => { playerFailed = true; };
      playerImg.src = ASSET_PATHS.player;

      const player = {
        x: 0,
        y: 0,
        r: 12,
        drawW: 0,
        drawH: 0,
        baseSpeed: 430,
        shield: 0,
        shieldUntil: 0,
        invincibleUntil: 0,
        blinkUntil: 0,
        noteUntil: 0
      };

      let obstacles = [];
      let items = [];
      let particles = [];
      let floatTexts = [];

      // 저장소와 랭킹
      function readNumber(key, fallback) {
        const raw = Number(localStorage.getItem(key));
        return Number.isFinite(raw) ? raw : fallback;
      }

      function normalizeName(name) {
        const cleaned = String(name || '')
          .replace(/[<>]/g, '')
          .trim()
          .replace(/\s+/g, ' ')
          .slice(0, 10);
        return cleaned || '익명';
      }

      function normalizePlayerKey(name) {
        return String(name || '')
          .trim()
          .replace(/\s+/g, ' ')
          .toLocaleLowerCase('ko-KR');
      }

      function normalizeRecord(item) {
        if (typeof item === 'number') {
          return { name: '익명', score: Math.round(item), time: 0, near: 0, createdAt: Date.now() };
        }
        const record = {
          name: normalizeName(item && item.name),
          score: Math.round(Number(item && item.score) || 0),
          time: Number(item && item.time) || 0,
          near: Math.round(Number(item && (item.near ?? item.nearMiss)) || 0),
          createdAt: Number(item && item.createdAt) || Date.now()
        };
        if (item && item.id != null) record.id = String(item.id);
        return record;
      }

      function compareRankRecords(a, b) {
        return (
          Number(b.score || 0) - Number(a.score || 0) ||
          Number(b.time || 0) - Number(a.time || 0) ||
          Number(a.createdAt || 0) - Number(b.createdAt || 0)
        );
      }

      function isBetterRecord(candidate, current) {
        return compareRankRecords(candidate, current) < 0;
      }

      function dedupeLeaderboardByNickname(records, limit = LEADERBOARD_LIMIT) {
        const bestByPlayer = new Map();

        records.map(normalizeRecord).forEach(record => {
          if (record.score <= 0) return;
          const key = normalizePlayerKey(record.name);
          if (!key) return;
          const current = bestByPlayer.get(key);
          if (!current || isBetterRecord(record, current)) bestByPlayer.set(key, record);
        });

        return Array.from(bestByPlayer.values())
          .sort(compareRankRecords)
          .slice(0, limit);
      }

      function sortTop(records) {
        return dedupeLeaderboardByNickname(records);
      }

      function readTop5() {
        try {
          return sortTop(JSON.parse(localStorage.getItem(STORAGE_KEYS.leaderboard) || '[]'));
        } catch {
          return [];
        }
      }

      function saveLocalTop5(records) {
        top5 = sortTop(records);
        localStorage.setItem(STORAGE_KEYS.leaderboard, JSON.stringify(top5));
      }

      function isSharedEnabled() {
        return /^https:\/\//.test(FIREBASE_CONFIG.databaseUrl.trim());
      }

      function boardUrl(suffix = '') {
        const base = FIREBASE_CONFIG.databaseUrl.trim().replace(/\/$/, '');
        const path = FIREBASE_CONFIG.boardPath.split('/').map(encodeURIComponent).join('/');
        return base + '/' + path + suffix;
      }

      async function fetchSharedRecords() {
        const res = await fetch(boardUrl('.json') + '?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('leaderboard fetch failed: ' + res.status);
        const data = await res.json();
        if (!data || typeof data !== 'object') return [];
        return Object.entries(data).map(([id, value]) => {
          const record = normalizeRecord(value);
          record.id = id;
          return record;
        });
      }

      function applySharedRecords(records) {
        top5 = sortTop(records);
        localStorage.setItem(STORAGE_KEYS.leaderboard, JSON.stringify(top5));
        best = Math.max(best, top5[0] ? top5[0].score : 0);
        localStorage.setItem(STORAGE_KEYS.bestScore, String(best));
        sharedLeaderboardReady = true;
        sharedLeaderboardError = false;
        renderRanking();
        updateHud();
        return top5;
      }

      async function fetchSharedTop5() {
        if (!isSharedEnabled()) {
          sharedLeaderboardReady = false;
          sharedLeaderboardError = false;
          return top5;
        }
        try {
          const records = await fetchSharedRecords();
          return applySharedRecords(records);
        } catch (error) {
          console.warn('[shared ranking] fetch failed', error);
          sharedLeaderboardReady = false;
          sharedLeaderboardError = true;
          top5 = readTop5();
          renderRanking();
          return top5;
        }
      }

      async function submitSharedRecord(record) {
        if (!isSharedEnabled()) return { ok: false, saved: false };
        try {
          const safeRecord = normalizeRecord({
            ...record,
            name: normalizeName(record.name),
            nearMiss: Math.round(Number(record.near ?? record.nearMiss) || 0),
            createdAt: Number(record.createdAt) || Date.now()
          });
          safeRecord.nearMiss = safeRecord.near;
          const records = await fetchSharedRecords();
          const playerKey = normalizePlayerKey(safeRecord.name);
          const matchingRecords = records.filter(item => normalizePlayerKey(item.name) === playerKey);
          const bestExisting = matchingRecords.slice().sort(compareRankRecords)[0] || null;

          if (bestExisting && !isBetterRecord(safeRecord, bestExisting)) {
            await trimSharedLeaderboard();
            await fetchSharedTop5();
            return { ok: true, saved: false };
          }

          const id = String(safeRecord.createdAt) + '_' + Math.random().toString(36).slice(2, 8);
          const updates = {};
          matchingRecords.forEach(item => {
            if (item.id) updates[item.id] = null;
          });
          updates[id] = safeRecord;
          const res = await fetch(boardUrl('.json'), {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updates)
          });
          if (!res.ok) throw new Error('leaderboard submit failed: ' + res.status);
          await trimSharedLeaderboard();
          await fetchSharedTop5();
          return { ok: true, saved: true };
        } catch (error) {
          console.warn('[shared ranking] submit failed', error);
          sharedLeaderboardReady = false;
          sharedLeaderboardError = true;
          renderRanking();
          return { ok: false, saved: false };
        }
      }

      async function trimSharedLeaderboard() {
        if (!isSharedEnabled()) return;
        const records = await fetchSharedRecords();
        const keepRecords = dedupeLeaderboardByNickname(records, SERVER_RECORD_LIMIT);
        const keepIds = new Set(keepRecords.map(record => record.id).filter(Boolean));
        const extraRecords = records.filter(record => record.id && !keepIds.has(record.id));
        const responses = await Promise.all(extraRecords.map(record =>
          fetch(boardUrl('/' + encodeURIComponent(record.id) + '.json'), { method: 'DELETE' })
        ));
        if (responses.some(response => !response.ok)) throw new Error('leaderboard cleanup failed');
      }

      function makeFinalRecord(seconds) {
        const finalScoreValue = Math.round(score);
        best = Math.max(best, finalScoreValue);
        localStorage.setItem(STORAGE_KEYS.bestScore, String(best));
        return {
          name: '익명',
          score: finalScoreValue,
          time: seconds,
          near: nearCount,
          nearMiss: nearCount,
          createdAt: Date.now()
        };
      }

      function isTop5Candidate(record) {
        const ranked = sortTop(top5.concat(record));
        return ranked.some(item => item.createdAt === record.createdAt && item.score === record.score);
      }

      async function saveRecordWithName(name) {
        if (!pendingRecord) return;
        const record = { ...pendingRecord, name: normalizeName(name), nearMiss: pendingRecord.near };
        localStorage.setItem(STORAGE_KEYS.playerName, record.name);
        pendingRecord = null;
        nameEntry.classList.remove('show');

        if (isSharedEnabled()) {
          showToast('공유 랭킹 저장 중...', 1200);
          const result = await submitSharedRecord(record);
          if (result.ok && result.saved) {
            showToast('서버 랭킹 저장 완료!', 1200);
          } else if (result.ok) {
            showToast('기존 기록이 더 높아 현재 기록을 유지합니다.', 1800);
          } else {
            saveLocalTop5(readTop5().concat(record));
            showToast('서버 저장 실패: 이 기기에만 임시 저장됨', 1800);
          }
        } else {
          saveLocalTop5(top5.concat(record));
          showToast('기기 랭킹 등록 완료!', 1200);
        }
        renderRanking();
      }

      // 화면 크기와 게임 생명주기
      function setAppHeight() {
        const vv = window.visualViewport;
        const height = Math.max(320, Math.floor((vv && vv.height) ? vv.height : window.innerHeight));
        document.documentElement.style.setProperty('--app-height', height + 'px');
      }

      function getSafeBottom() {
        const raw = getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom').trim();
        const px = parseFloat(raw);
        return Number.isFinite(px) ? px : 0;
      }

      function getBottomReserve() {
        const safeBottom = getSafeBottom();
        if (H < 520) return Math.max(72, 67 + safeBottom);
        return Math.max(104, 98 + safeBottom);
      }

      function positionPlayer() {
        const minDrawH = H < 520 ? 43 : 51;
        player.drawH = Math.max(minDrawH, Math.min(73, W * 0.1595));
        player.drawW = Math.round(player.drawH * (2 / 3));
        const bottomOffset = getBottomReserve();
        player.y = H - bottomOffset - player.drawH * 0.20;
        if (!player.x) player.x = W / 2;
        const sideRadius = getPlayerHorizontalRadius();
        player.x = clamp(player.x, sideRadius, W - sideRadius);
      }

      function resize() {
        setAppHeight();
        const rect = app.getBoundingClientRect();
        W = Math.max(280, Math.floor(rect.width));
        H = Math.max(320, Math.floor(rect.height));
        dpr = Math.min(window.devicePixelRatio || 1, DPR_LIMIT);
        canvas.width = Math.floor(W * dpr);
        canvas.height = Math.floor(H * dpr);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        positionPlayer();
      }

      function releaseControls() {
        leftHeld = false;
        rightHeld = false;
        keys.clear();
        leftBtn.classList.remove('is-pressed');
        rightBtn.classList.remove('is-pressed');
      }

      function resetGame() {
        elapsed = 0;
        score = 0;
        bonusScore = 0;
        combo = 0;
        comboExpiresAt = 0;
        nearCount = 0;
        lastMilestone = 0;
        nextObstacleAt = 0;
        nextItemAt = 4.5;
        nextBossAt = 38;
        hiddenAt = 0;
        shake = 0;
        releaseControls();
        clearTimeout(toastTimer);
        toast.classList.remove('show');
        obstacles = [];
        items = [];
        particles = [];
        floatTexts = [];
        pendingRecord = null;
        nameEntry.classList.remove('show');
        player.x = W / 2;
        player.r = Math.max(10, Math.min(13, W * 0.0275));
        positionPlayer();
        player.shield = 0;
        player.shieldUntil = 0;
        player.invincibleUntil = 0;
        player.blinkUntil = 0;
        player.noteUntil = 0;
        updateHud();
      }

      function startGame() {
        unlockAudio();
        resize();
        resetGame();
        state = GAME_STATE.PLAYING;
        startOverlay.classList.add('is-hidden');
        leaderboardOverlay.classList.add('is-hidden');
        gameOverOverlay.classList.add('is-hidden');
        startOverlay.style.display = 'none';
        leaderboardOverlay.style.display = 'none';
        gameOverOverlay.style.display = 'none';
        startTime = performance.now();
        lastTime = startTime;
        hiddenAt = 0;
        playTone('start');
        cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
      }

      function endGame() {
        if (state !== GAME_STATE.PLAYING) return;
        state = GAME_STATE.GAME_OVER;
        playTone('whistle');
        shake = Math.max(shake, 18);
        pendingRecord = makeFinalRecord(elapsed);
        const finishedRecord = pendingRecord;
        updateHud();
        finalScore.textContent = Math.round(score) + '점';
        finalTime.textContent = formatTime(elapsed) + '초';
        finalBest.textContent = Math.round(best) + '점';
        endingText.textContent = getEndingText(elapsed);
        renderRanking();
        // Firebase가 켜진 경우, 최신 서버 TOP 5를 먼저 불러온 뒤 진입 여부를 판단한다.
        if (isSharedEnabled()) {
          fetchSharedTop5().then(() => {
            if (state !== GAME_STATE.GAME_OVER || pendingRecord !== finishedRecord) return;
            const shouldAskName = isTop5Candidate(finishedRecord);
            if (shouldAskName) {
              nameEntry.classList.add('show');
              playerNameInput.value = localStorage.getItem(STORAGE_KEYS.playerName) || '';
              nameEntryTitle.textContent = '🏆 명예의 전당 진입! 이름을 남겨주세요.';
            } else {
              nameEntry.classList.remove('show');
            }
          });
        }
        const shouldAskName = !isSharedEnabled() && isTop5Candidate(finishedRecord);
        if (shouldAskName) {
          nameEntry.classList.add('show');
          playerNameInput.value = localStorage.getItem(STORAGE_KEYS.playerName) || '';
          nameEntryTitle.textContent = '🏆 TOP 5 진입! 이름을 남겨주세요.';
        } else {
          nameEntry.classList.remove('show');
        }
        setTimeout(() => {
          if (state !== GAME_STATE.GAME_OVER || pendingRecord !== finishedRecord) return;
          startOverlay.classList.add('is-hidden');
          startOverlay.style.display = 'none';
          leaderboardOverlay.classList.add('is-hidden');
          leaderboardOverlay.style.display = 'none';
          gameOverOverlay.classList.remove('is-hidden');
          gameOverOverlay.style.display = '';
          if (shouldAskName) playerNameInput.focus({ preventScroll: true });
        }, 220);
      }

      function getEndingText(seconds) {
        if (seconds >= 90) return '이 정도면 띵보님 피하기 국가대표입니다.';
        if (seconds >= 60) return '와… 이 정도면 거의 전설입니다.';
        if (seconds >= 35) return '꽤 오래 버텼습니다. VAR실에서 박수 나옵니다.';
        if (seconds >= 15) return '가능성은 봤습니다. 다음 경기 갑시다.';
        return '너무 이른 탈락입니다. 다시 도전하시죠.';
      }

      // 랭킹 UI
      function renderRanking(targetEl = rankingEl, noteEl = rankNote) {
        if (!targetEl) return;
        targetEl.innerHTML = '';
        const title = document.createElement('div');
        title.className = 'rank-line';
        const label = isSharedEnabled() ? '🏆 명예의 전당' : '🏆 기기 TOP 5';
        title.innerHTML = '<span>' + label + '</span><span>이름 / 점수</span>';
        targetEl.appendChild(title);
        const rows = top5.length ? top5 : [
          { name: '-', score: 0, time: 0, near: 0 },
          { name: '-', score: 0, time: 0, near: 0 },
          { name: '-', score: 0, time: 0, near: 0 },
          { name: '-', score: 0, time: 0, near: 0 },
          { name: '-', score: 0, time: 0, near: 0 }
        ];
        rows.slice(0, LEADERBOARD_LIMIT).forEach((record, index) => {
          const row = document.createElement('div');
          row.className = 'rank-line';
          const medal = ['🥇', '🥈', '🥉', '4위', '5위'][index];
          const name = normalizeName(record.name || '-');
          const sub = record.score > 0 ? name + ' · ' + Math.round(record.score) + '점 · ' + formatTime(record.time) + '초 · 아슬 ' + record.near : '기록 없음';
          row.innerHTML = '<span>' + medal + '</span><span>' + sub + '</span>';
          targetEl.appendChild(row);
        });
        if (noteEl) {
          if (isSharedEnabled() && sharedLeaderboardReady) noteEl.textContent = '공유 랭킹 연결 완료: 현재 표시되는 명예의 전당은 Firebase 서버에서 불러온 기록입니다.';
          else if (isSharedEnabled() && sharedLeaderboardError) noteEl.textContent = '공유 랭킹 연결 실패: Firebase 규칙에서 rankings 읽기/쓰기를 허용했는지 확인해 주세요. 지금 보이는 기록은 이 기기 임시 기록입니다.';
          else if (isSharedEnabled()) noteEl.textContent = '공유 랭킹 연결 중...';
          else noteEl.textContent = '현재는 이 기기 안에만 저장됩니다. Firebase 주소를 넣으면 모두에게 공유됩니다.';
        }
        if (targetEl === rankingEl && leaderboardRankingEl) {
          renderRanking(leaderboardRankingEl, leaderboardNote);
        }
      }

      // 메인 루프와 플레이어 이동
      function loop(now) {
        const rawDt = Math.min(0.033, (now - lastTime) / 1000 || 0);
        lastTime = now;
        if (state === GAME_STATE.PLAYING) {
          elapsed = (now - startTime) / 1000;
          const slowFactor = isNoteActive() ? 0.54 : 1;
          const dt = rawDt;
          score = Math.floor(elapsed * 10) + bonusScore;
          updatePlayer(dt);
          updateSpawning();
          updateObstacles(dt, slowFactor);
          updateItems(dt);
          updateParticles(dt);
          updateFloatTexts(dt);
          checkMilestones();
          updateHud();
        } else {
          updateParticles(rawDt);
          updateFloatTexts(rawDt);
        }
        draw();
        animationId = requestAnimationFrame(loop);
      }

      function updatePlayer(dt) {
        let dir = 0;
        if (leftHeld || keys.has('ArrowLeft') || keys.has('KeyA')) dir -= 1;
        if (rightHeld || keys.has('ArrowRight') || keys.has('KeyD')) dir += 1;
        if (dir !== 0) {
          player.x += dir * player.baseSpeed * dt;
        }
        const sideRadius = getPlayerHorizontalRadius();
        player.x = clamp(player.x, sideRadius, W - sideRadius);
      }

      // 생성 패턴과 난이도
      function updateSpawning() {
        const intensity = getIntensity();
        if (elapsed >= nextObstacleAt) {
          spawnObstacleRandom();
          const baseGap = lerp(0.86, 0.31, intensity);
          nextObstacleAt = elapsed + random(baseGap * 0.70, baseGap * 1.12);
        }
        if (elapsed >= nextItemAt) {
          spawnItem();
          nextItemAt = elapsed + random(9, 15);
        }
        if (elapsed >= nextBossAt && elapsed >= 35) {
          spawnBoss();
          nextBossAt = elapsed + random(34, 46);
        }
      }

      function getIntensity() {
        return clamp(elapsed / 100, 0, 1);
      }

      function getMaxObstacleCount() {
        return Math.floor(lerp(8, 14, getIntensity()));
      }

      function estimateObstacleX(ob, t) {
        if (ob.type === 'zigzag') {
          return ob.baseX + Math.sin((elapsed - ob.born + t) * ob.wobble * 4.2) * ob.amp;
        }
        return ob.x + (ob.vx || 0) * t;
      }

      function scoreSpawnCandidate(x, r, vy, type) {
        const hit = getPlayerHitCircle();
        const newArrive = clamp((hit.y + r + 80) / Math.max(70, vy), 0.4, 4.2);
        const playerSafe = getPlayerHorizontalRadius() + r + 20;
        let score = 0;

        // 시작부터 플레이어 바로 위만 계속 막지 않도록 약간 벌린다.
        const playerDx = Math.abs(x - player.x);
        if (playerDx < playerSafe) {
          score += (1 - playerDx / playerSafe) * (type === 'fast' ? 7 : 4.5);
        }

        for (const ob of obstacles) {
          if (ob.y > H + ob.r || ob.y < -260) continue;
          const obVy = Math.max(60, ob.vy || 170);
          const t = clamp((hit.y - ob.y) / obVy, 0, 4.2);
          const projectedX = estimateObstacleX(ob, t);
          const projectedY = ob.y + obVy * t;
          const timeDiff = Math.abs(t - newArrive);
          const verticalRelevant = projectedY > hit.y - 210 && projectedY < hit.y + 130;
          const blockRange = r + (ob.hitRadius || ob.r * 0.72) + getPlayerHorizontalRadius() * 0.55 + 20;
          const dx = Math.abs(projectedX - x);

          if (dx < blockRange && (timeDiff < 1.25 || verticalRelevant)) {
            score += ((blockRange - dx) / blockRange) * (9 / (1 + timeDiff));
          }

          if (ob.y < H * 0.45 && Math.abs(ob.x - x) < r + ob.r + 26) {
            score += 4;
          }
        }

        return score;
      }

      function getFairSpawnX(r, type, vy) {
        const candidates = [];
        const lanes = Math.max(6, Math.min(9, Math.floor(W / 54)));
        for (let i = 0; i < lanes; i++) {
          candidates.push(clamp((W / lanes) * (i + 0.5), r + 8, W - r - 8));
        }
        for (let i = 0; i < 10; i++) {
          candidates.push(random(r + 8, W - r - 8));
        }

        candidates.sort((a, b) => scoreSpawnCandidate(a, r, vy, type) - scoreSpawnCandidate(b, r, vy, type));
        return candidates[0] || random(r + 8, W - r - 8);
      }

      function spawnObstacleRandom() {
        const intensity = getIntensity();
        if (obstacles.length >= getMaxObstacleCount()) return false;

        const roll = Math.random();
        let type = 'normal';
        const chaserChance = lerp(0.08, 0.17, intensity);
        const fastChance = lerp(0.09, 0.19, intensity);
        const zigzagChance = lerp(0.05, 0.13, intensity);
        const bigChance = lerp(0.03, 0.09, intensity);

        if (elapsed > 10 && roll < chaserChance) type = 'chaser';
        else if (elapsed > 16 && roll < chaserChance + fastChance) type = 'fast';
        else if (elapsed > 26 && roll < chaserChance + fastChance + zigzagChance) type = 'zigzag';
        else if (elapsed > 38 && roll < chaserChance + fastChance + zigzagChance + bigChance) type = 'big';

        createObstacle({ type, intensity });
        return true;
      }

      function createObstacle({ type = 'normal', x = null, y = null, size = null, speed = null, intensity = getIntensity(), vx = null } = {}) {
        const baseSize = size || random(41, 58) + intensity * 11;
        let r = baseSize / 2;
        let vy = speed || random(142, 202) + intensity * 135;
        let spin = random(-2.4, 2.4);
        let wobble = random(0.8, 1.8);
        let amp = random(8, 22);
        if (type === 'fast') {
          r *= random(0.78, 0.92);
          vy *= random(1.45, 1.75);
          spin *= 2.1;
        }
        if (type === 'big') {
          r *= random(1.35, 1.7);
          vy *= 0.78;
          amp *= 0.5;
        }
        if (type === 'chaser') {
          spin *= 1.4;
        }
        if (type === 'boss') {
          r = Math.min(W * 0.24, 92);
          vy = random(116, 145) + intensity * 35;
          spin = random(-1.2, 1.2);
          amp = 0;
        }
        const ob = {
          type,
          x: x ?? getFairSpawnX(r, type, vy),
          y: y ?? -r - random(10, 80),
          baseX: 0,
          r,
          vy,
          vx: vx ?? random(-28, 28),
          rot: random(0, Math.PI * 2),
          spin,
          wobble,
          amp,
          born: elapsed,
          nearScored: false,
          hitRadius: r * (type === 'big' || type === 'boss' ? 0.78 : 0.72)
        };
        ob.baseX = ob.x;
        obstacles.push(ob);
      }

      function spawnBoss() {
        showToast('대형 띵보님 등장!', 1100);
        playTone('boss');
        const side = Math.random() < 0.5 ? W * 0.25 : W * 0.75;
        createObstacle({ type: 'boss', x: side, y: -130, size: Math.min(W * 0.44, 174), speed: random(120, 145), vx: side < W / 2 ? 18 : -18 });
      }

      function spawnItem() {
        const types = ['var', 'note'];
        const type = types[Math.floor(Math.random() * types.length)];
        items.push({
          type,
          x: random(38, W - 38),
          y: -36,
          r: 18,
          vy: random(120, 155),
          rot: random(0, Math.PI * 2),
          spin: random(-2, 2)
        });
      }

      // 충돌, 아이템, 점수 이벤트
      function updateObstacles(dt, slowFactor) {
        const now = elapsed;
        const playerHit = getPlayerHitCircle();
        for (const ob of obstacles) {
          const localAge = now - ob.born;
          if (ob.type === 'chaser') {
            const dx = player.x - ob.x;
            ob.vx += clamp(dx * 0.8, -80, 80) * dt;
            ob.vx = clamp(ob.vx, -76, 76);
          }
          if (ob.type === 'zigzag') {
            ob.x = ob.baseX + Math.sin(localAge * ob.wobble * 4.2) * ob.amp;
          } else {
            ob.x += ob.vx * dt * slowFactor;
          }
          ob.y += ob.vy * dt * slowFactor;
          ob.rot += ob.spin * dt;
          if (ob.x < ob.r) { ob.x = ob.r; ob.vx = Math.abs(ob.vx) * 0.75; ob.baseX = ob.x; }
          if (ob.x > W - ob.r) { ob.x = W - ob.r; ob.vx = -Math.abs(ob.vx) * 0.75; ob.baseX = ob.x; }

          const isCollision = collidesObstacle(ob);
          if (!isCollision && !ob.nearScored && ob.y > playerHit.y - ob.r && ob.y < playerHit.y + playerHit.r * 2.4) {
            const dist = Math.hypot(ob.x - playerHit.x, ob.y - playerHit.y);
            const nearBand = ob.hitRadius + playerHit.r + 24;
            const hitBand = ob.hitRadius + playerHit.r;
            if (dist < nearBand && dist > hitBand) {
              ob.nearScored = true;
              nearMiss(ob.x, ob.y);
            }
          }

          if (isCollision) {
            handleHit(ob);
            if (state !== GAME_STATE.PLAYING) break;
          }
        }
        obstacles = obstacles.filter(ob => ob.y < H + ob.r + 80);
      }

      function getPlayerHitCircle() {
        return {
          x: player.x,
          y: player.y - player.drawH * 0.32,
          r: Math.max(player.drawW * 0.38, player.drawH * 0.22)
        };
      }

      function getPlayerHorizontalRadius() {
        return Math.max(player.r + 4, player.drawW * 0.45 + 3);
      }

      function getPlayerHitEllipses() {
        const top = player.y - player.drawH * 0.82;
        const w = player.drawW;
        const h = player.drawH;
        return [
          { x: player.x, y: top + h * 0.26, rx: w * 0.43, ry: h * 0.19 },
          { x: player.x, y: top + h * 0.50, rx: w * 0.26, ry: h * 0.25 },
          { x: player.x - w * 0.16, y: top + h * 0.73, rx: w * 0.14, ry: h * 0.25 },
          { x: player.x + w * 0.16, y: top + h * 0.73, rx: w * 0.14, ry: h * 0.25 }
        ];
      }

      function circleIntersectsEllipse(cx, cy, radius, ellipse) {
        const dx = (cx - ellipse.x) / (ellipse.rx + radius);
        const dy = (cy - ellipse.y) / (ellipse.ry + radius);
        return dx * dx + dy * dy < 1;
      }

      function collidesObstacle(ob) {
        if (elapsed < player.invincibleUntil) return false;
        return getPlayerHitEllipses().some(ellipse =>
          circleIntersectsEllipse(ob.x, ob.y, ob.hitRadius, ellipse)
        );
      }

      function handleHit(ob) {
        if (player.shield > 0 && elapsed <= player.shieldUntil) {
          player.shield = 0;
          player.shieldUntil = 0;
          player.invincibleUntil = elapsed + 1.2;
          player.blinkUntil = elapsed + 1.2;
          showToast('VAR 판독: 노파울!', 1050);
          playTone('shield');
          shake = Math.max(shake, 13);
          burst(ob.x, ob.y, 24, '#93c5fd');
          obstacles = obstacles.filter(item => item !== ob);
          return;
        }
        if (player.shield > 0 && elapsed > player.shieldUntil) {
          player.shield = 0;
          player.shieldUntil = 0;
        }
        const hit = getPlayerHitCircle();
        burst(hit.x, hit.y, 32, '#fca5a5');
        endGame();
      }

      function nearMiss(x, y) {
        nearCount += 1;
        combo = elapsed <= comboExpiresAt ? Math.min(5, combo + 1) : 1;
        comboExpiresAt = elapsed + COMBO_WINDOW_SECONDS;
        const bonus = 12 * combo;
        bonusScore += bonus;
        score = Math.floor(elapsed * 10) + bonusScore;
        addFloatText('아슬아슬 +' + bonus, x, y, '#fde047');
        showToast('아슬아슬 +' + bonus, 520);
        playTone('near');
        burst(x, y, 10, '#fde047');
      }

      function updateItems(dt) {
        const playerHit = getPlayerHitCircle();
        for (const item of items) {
          item.y += item.vy * dt;
          item.rot += item.spin * dt;
          const dist = Math.hypot(item.x - playerHit.x, item.y - playerHit.y);
          if (dist < item.r + playerHit.r + 8) {
            collectItem(item);
            item.collected = true;
          }
        }
        items = items.filter(item => !item.collected && item.y < H + 60);
      }

      function collectItem(item) {
        if (item.type === 'var') {
          player.shield = 1;
          player.shieldUntil = elapsed + 5;
          showToast('VAR 획득! 5초 안에 1회 무효', 900);
          burst(item.x, item.y, 22, '#93c5fd');
        } else if (item.type === 'note') {
          player.noteUntil = elapsed + 5.2;
          showToast('전술 노트! 슬로모션', 900);
          burst(item.x, item.y, 22, '#d8b4fe');
        }
        playTone('pickup');
        addFloatText(getItemLabel(item.type), item.x, item.y, '#ffffff');
      }

      function checkMilestones() {
        const next = Math.floor(elapsed / 15) * 15;
        if (next > 0 && next !== lastMilestone) {
          lastMilestone = next;
          const messages = {
            15: '15초 생존! 몸이 풀렸습니다',
            30: '30초! 아직 살아있습니다',
            45: '45초! 수비 집중력 좋습니다',
            60: '60초! 전설의 시작',
            75: '75초! 이건 귀합니다',
            90: '90초! 풀타임 생존 본능'
          };
          showToast(messages[next] || next + '초 생존!', 1050);
          playTone('milestone');
        }
      }

      // 일시 효과와 HUD
      function updateParticles(dt) {
        for (const p of particles) {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 240 * dt;
          p.life -= dt;
          p.rot += p.spin * dt;
        }
        particles = particles.filter(p => p.life > 0);
      }

      function updateFloatTexts(dt) {
        for (const t of floatTexts) {
          t.y -= 50 * dt;
          t.life -= dt;
          t.scale += dt * 0.25;
        }
        floatTexts = floatTexts.filter(t => t.life > 0);
      }

      function updateHud() {
        timeText.textContent = formatTime(elapsed);
        scoreText.textContent = String(Math.round(score));
        if (combo > 0 && elapsed > comboExpiresAt) combo = 0;
        if (player.shield > 0 && elapsed > player.shieldUntil) {
          player.shield = 0;
          player.shieldUntil = 0;
        }
        const pills = [];
        if (combo > 1) pills.push(['🔥 COMBO x' + combo, 'red']);
        if (player.shield > 0) pills.push(['📺 VAR ' + Math.max(0, Math.ceil(player.shieldUntil - elapsed)) + '초', 'blue']);
        if (isNoteActive()) pills.push(['📋 슬로우 ' + Math.ceil(player.noteUntil - elapsed) + '초', 'purple']);
        if (nearCount > 0) pills.push(['⚡ 아슬아슬 ' + nearCount + '회', '']);
        statusRow.innerHTML = pills.map(([text, color]) => '<span class="pill ' + color + '">' + text + '</span>').join('');
      }

      // 캔버스 렌더링
      function draw() {
        const sx = shake > 0 ? random(-shake, shake) : 0;
        const sy = shake > 0 ? random(-shake, shake) : 0;
        shake = Math.max(0, shake - 0.85);
        ctx.save();
        ctx.clearRect(0, 0, W, H);
        ctx.translate(sx, sy);
        drawField();
        for (const item of items) drawItem(item);
        for (const ob of obstacles) drawObstacle(ob);
        for (const p of particles) drawParticle(p);
        drawPlayer();
        for (const t of floatTexts) drawFloatText(t);
        if (isNoteActive()) drawSlowOverlay();
        ctx.restore();
      }

      function drawField() {
        const groundY = H - Math.max(94, H * 0.12);
        ctx.save();
        ctx.globalAlpha = 0.32;
        ctx.strokeStyle = 'rgba(255,255,255,.85)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(W / 2, 86);
        ctx.lineTo(W / 2, groundY);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(W / 2, groundY * 0.48, Math.min(W * 0.22, 82), 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeRect(42, groundY - 42, W - 84, 50);
        ctx.globalAlpha = 0.12;
        for (let x = -W; x < W * 2; x += 48) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + H * 0.45, H);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawObstacle(ob) {
        ctx.save();
        ctx.translate(ob.x, ob.y);
        ctx.rotate(ob.rot);
        const r = ob.r;
        ctx.shadowColor = 'rgba(0,0,0,.32)';
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 8;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();
        if (hmbLoaded && !hmbFailed) {
          ctx.drawImage(hmbImg, -r, -r, r * 2, r * 2);
        } else {
          const grad = ctx.createRadialGradient(-r * .25, -r * .28, r * .18, 0, 0, r);
          grad.addColorStop(0, '#fde68a');
          grad.addColorStop(1, '#d97706');
          ctx.fillStyle = grad;
          ctx.fillRect(-r, -r, r * 2, r * 2);
          ctx.fillStyle = '#111827';
          ctx.font = '900 ' + Math.floor(r * .9) + 'px system-ui';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('띵', 0, 2);
        }
        ctx.restore();

        ctx.save();
        ctx.translate(ob.x, ob.y);
        ctx.strokeStyle = ob.type === 'boss' ? 'rgba(239,68,68,.95)' : 'rgba(255,255,255,.86)';
        ctx.lineWidth = ob.type === 'boss' ? 5 : 3;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
        if (ob.type === 'chaser') drawTag('추적', r);
        if (ob.type === 'fast') drawTag('슝', r);
        if (ob.type === 'boss') drawTag('대형', r);
        ctx.restore();
      }

      function drawTag(text, r) {
        ctx.rotate(-0.15);
        ctx.fillStyle = 'rgba(15,23,42,.82)';
        roundRect(ctx, -r * .62, r * .55, r * 1.24, 18, 9);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '900 11px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 0, r * .55 + 9);
      }

      function drawItem(item) {
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.rotate(item.rot);
        const colors = {
          var: ['#dbeafe', '#60a5fa'],
          note: ['#f3e8ff', '#a855f7']
        };
        const [c1, c2] = colors[item.type] || colors.var;
        const grad = ctx.createRadialGradient(-6, -7, 2, 0, 0, item.r * 1.45);
        grad.addColorStop(0, c1);
        grad.addColorStop(1, c2);
        ctx.shadowColor = 'rgba(255,255,255,.32)';
        ctx.shadowBlur = 18;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, item.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,.88)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#111827';
        ctx.font = '900 15px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(getItemIcon(item.type), 0, 1);
        ctx.restore();
      }

      function drawPlayer() {
        const blink = elapsed < player.blinkUntil && Math.floor(elapsed * 16) % 2 === 0;
        if (blink) return;
        ctx.save();
        ctx.translate(player.x, player.y);

        if (player.shield > 0 && elapsed <= player.shieldUntil) {
          ctx.strokeStyle = 'rgba(147,197,253,.95)';
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(0, -player.drawH * 0.18, player.r + 18 + Math.sin(elapsed * 8) * 2, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.shadowColor = 'rgba(0,0,0,.30)';
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 8;

        if (playerLoaded && !playerFailed) {
          ctx.drawImage(playerImg, -player.drawW / 2, -player.drawH * 0.82, player.drawW, player.drawH);
        } else {
          ctx.fillStyle = '#facc15';
          roundRect(ctx, -player.r * 0.9, -player.r * 1.1, player.r * 1.8, player.r * 2.15, 12);
          ctx.fill();
          ctx.fillStyle = '#2563eb';
          roundRect(ctx, -player.r * 0.72, -player.r * 0.08, player.r * 1.44, player.r * 1.05, 9);
          ctx.fill();
          ctx.fillStyle = '#fde68a';
          ctx.beginPath();
          ctx.arc(0, -player.r * 0.58, player.r * 0.58, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#111827';
          ctx.beginPath();
          ctx.arc(-player.r * 0.18, -player.r * 0.62, 2.2, 0, Math.PI * 2);
          ctx.arc(player.r * 0.18, -player.r * 0.62, 2.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#111827';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, -player.r * 0.48, player.r * 0.22, 0, Math.PI);
          ctx.stroke();
          ctx.fillStyle = '#fff';
          ctx.font = '900 ' + Math.floor(player.r * 0.52) + 'px system-ui';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('K', 0, player.r * 0.43);
        }

        ctx.restore();
      }

      function drawParticle(p) {
        const alpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        roundRect(ctx, -p.size / 2, -p.size / 2, p.size, p.size, p.size * .3);
        ctx.fill();
        ctx.restore();
      }

      function drawFloatText(t) {
        const alpha = clamp(t.life / t.maxLife, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(t.x, t.y);
        ctx.scale(t.scale, t.scale);
        ctx.font = '1000 18px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.lineWidth = 5;
        ctx.strokeStyle = 'rgba(15,23,42,.76)';
        ctx.strokeText(t.text, 0, 0);
        ctx.fillStyle = t.color;
        ctx.fillText(t.text, 0, 0);
        ctx.restore();
      }

      function drawSlowOverlay() {
        ctx.save();
        ctx.globalAlpha = 0.10;
        ctx.fillStyle = '#a855f7';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      // 시각 효과와 공통 도우미
      function burst(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = random(0, Math.PI * 2);
          const speed = random(60, 230);
          const life = random(0.35, 0.75);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - random(20, 70),
            size: random(4, 9),
            color,
            life,
            maxLife: life,
            rot: random(0, Math.PI * 2),
            spin: random(-8, 8)
          });
        }
      }

      function addFloatText(text, x, y, color) {
        floatTexts.push({ text, x, y, color, life: 0.85, maxLife: 0.85, scale: 0.94 });
      }

      function showToast(text, duration = 800) {
        toast.textContent = text;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
      }

      function isNoteActive() {
        return elapsed < (player.noteUntil || 0);
      }

      function getItemIcon(type) {
        if (type === 'var') return 'VAR';
        return '📋';
      }

      function getItemLabel(type) {
        if (type === 'var') return 'VAR';
        return '전술 노트';
      }

      function formatTime(value) {
        return Math.max(0, value).toFixed(1);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function lerp(a, b, t) {
        return a + (b - a) * clamp(t, 0, 1);
      }

      function roundRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      // 오디오
      function unlockAudio() {
        if (audioReady) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          audioCtx = audioCtx || new AudioContext();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          audioReady = true;
        } catch {
          audioReady = false;
        }
      }

      function playTone(type) {
        if (!audioReady || !audioCtx) return;
        const now = audioCtx.currentTime;
        const master = audioCtx.createGain();
        master.gain.value = 0.055;
        master.connect(audioCtx.destination);

        if (type === 'whistle') {
          beep(now, 1200, 0.09, 'square', master, 0.045);
          beep(now + 0.10, 1500, 0.20, 'square', master, 0.050);
          return;
        }
        if (type === 'pickup') {
          beep(now, 660, 0.055, 'sine', master, 0.045);
          beep(now + 0.055, 990, 0.075, 'sine', master, 0.044);
          return;
        }
        if (type === 'near') {
          beep(now, 880, 0.045, 'triangle', master, 0.035);
          return;
        }
        if (type === 'shield') {
          beep(now, 260, 0.08, 'sawtooth', master, 0.04);
          beep(now + 0.08, 520, 0.12, 'sawtooth', master, 0.04);
          return;
        }
        if (type === 'boss') {
          beep(now, 220, 0.09, 'sawtooth', master, 0.05);
          beep(now + 0.09, 180, 0.09, 'sawtooth', master, 0.05);
          beep(now + 0.18, 260, 0.14, 'sawtooth', master, 0.05);
          return;
        }
        if (type === 'milestone') {
          beep(now, 523, 0.06, 'sine', master, 0.04);
          beep(now + 0.07, 659, 0.06, 'sine', master, 0.04);
          beep(now + 0.14, 784, 0.1, 'sine', master, 0.04);
          return;
        }
        beep(now, 440, 0.08, 'sine', master, 0.04);
        beep(now + 0.08, 660, 0.08, 'sine', master, 0.04);
      }

      function beep(start, frequency, duration, type, output, volume) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(volume, start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(output);
        osc.start(start);
        osc.stop(start + duration + 0.02);
      }

      // 입력과 브라우저 이벤트
      function bindHoldButton(button, direction) {
        const down = (event) => {
          event.preventDefault();
          unlockAudio();
          if (direction < 0) leftHeld = true;
          if (direction > 0) rightHeld = true;
          button.classList.add('is-pressed');
          try { button.setPointerCapture(event.pointerId); } catch {}
        };
        const up = (event) => {
          event.preventDefault();
          if (direction < 0) leftHeld = false;
          if (direction > 0) rightHeld = false;
          button.classList.remove('is-pressed');
        };
        button.addEventListener('pointerdown', down, { passive: false });
        button.addEventListener('pointerup', up, { passive: false });
        button.addEventListener('pointercancel', up, { passive: false });
        button.addEventListener('pointerleave', up, { passive: false });
      }

      function isTypingTarget(target) {
        return target instanceof HTMLInputElement ||
          target instanceof HTMLTextAreaElement ||
          Boolean(target && target.isContentEditable);
      }

      window.addEventListener('keydown', (event) => {
        if (isTypingTarget(event.target)) return;
        if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'Space', 'Enter'].includes(event.code)) {
          event.preventDefault();
          unlockAudio();
        }
        keys.add(event.code);
        if ((event.code === 'Space' || event.code === 'Enter') && state !== GAME_STATE.PLAYING) startGame();
      });

      window.addEventListener('keyup', (event) => {
        if (isTypingTarget(event.target)) return;
        keys.delete(event.code);
      });

      document.addEventListener('visibilitychange', () => {
        const now = performance.now();
        if (document.hidden) {
          if (state === GAME_STATE.PLAYING && !hiddenAt) hiddenAt = now;
          releaseControls();
        } else if (hiddenAt) {
          if (state === GAME_STATE.PLAYING) startTime += now - hiddenAt;
          hiddenAt = 0;
          lastTime = now;
        }
      });

      document.addEventListener('touchmove', (event) => {
        if (state === GAME_STATE.PLAYING) event.preventDefault();
      }, { passive: false });
      window.addEventListener('resize', resize);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', resize);
        window.visualViewport.addEventListener('scroll', resize);
      }
      window.addEventListener('orientationchange', () => setTimeout(resize, 160));

      function preventButtonEvent(event) {
        if (!event) return;
        event.preventDefault();
        event.stopPropagation();
      }

      function bindActionButton(button, handler) {
        if (!button) return;
        let lastRunAt = -10000;
        const run = (event) => {
          preventButtonEvent(event);
          const now = performance.now();
          if (now - lastRunAt < 420) return;
          lastRunAt = now;
          try {
            handler(event);
          } catch (error) {
            console.error('[button action failed]', error);
            showToast('버튼 오류가 발생했습니다. 새로고침 후 다시 시도해주세요.', 1400);
          }
        };
        button.onclick = run;
        button.ontouchend = run;
        button.onpointerup = run;
      }

      function forceStartFromButton(event) {
        preventButtonEvent(event);
        startGame();
      }

      async function openLeaderboard() {
        unlockAudio();
        renderRanking(leaderboardRankingEl, leaderboardNote);
        startOverlay.classList.add('is-hidden');
        startOverlay.style.display = 'none';
        gameOverOverlay.classList.add('is-hidden');
        gameOverOverlay.style.display = 'none';
        leaderboardOverlay.classList.remove('is-hidden');
        leaderboardOverlay.style.display = '';
        await fetchSharedTop5();
        renderRanking(leaderboardRankingEl, leaderboardNote);
      }

      // 캡처 단계에서 먼저 버튼을 잡는다. 버튼 자체의 click이 막히는 환경에서도 경기 시작이 실행된다.
      document.addEventListener('click', (event) => {
        const target = event.target;
        if (target && target.closest && target.closest('#startBtn')) forceStartFromButton(event);
        else if (target && target.closest && target.closest('#leaderboardBtn')) {
          preventButtonEvent(event);
          openLeaderboard();
        }
      }, true);

      document.addEventListener('touchend', (event) => {
        const target = event.target;
        if (target && target.closest && target.closest('#startBtn')) forceStartFromButton(event);
        else if (target && target.closest && target.closest('#leaderboardBtn')) {
          preventButtonEvent(event);
          openLeaderboard();
        }
      }, { capture: true, passive: false });

      window.__ddingboStartGame = forceStartFromButton;
      window.__ddingboOpenLeaderboard = (event) => {
        preventButtonEvent(event);
        openLeaderboard();
      };

      bindHoldButton(leftBtn, -1);
      bindHoldButton(rightBtn, 1);
      bindActionButton(startBtn, forceStartFromButton);
      bindActionButton(leaderboardBtn, openLeaderboard);
      bindActionButton(leaderboardCloseBtn, () => {
        leaderboardOverlay.classList.add('is-hidden');
        leaderboardOverlay.style.display = 'none';
        startOverlay.classList.remove('is-hidden');
        startOverlay.style.display = '';
      });
      bindActionButton(restartBtn, forceStartFromButton);
      bindActionButton(saveNameBtn, () => saveRecordWithName(playerNameInput.value));
      playerNameInput.addEventListener('keydown', event => {
        event.stopPropagation();
        if (event.key === 'Enter') {
          event.preventDefault();
          saveRecordWithName(playerNameInput.value);
        }
      });
      bindActionButton(menuBtn, () => {
        unlockAudio();
        state = GAME_STATE.READY;
        gameOverOverlay.classList.add('is-hidden');
        gameOverOverlay.style.display = 'none';
        leaderboardOverlay.classList.add('is-hidden');
        leaderboardOverlay.style.display = 'none';
        startOverlay.classList.remove('is-hidden');
        startOverlay.style.display = '';
        resetGame();
      });

      // 초기 실행
      resize();
      resetGame();
      renderRanking();
      fetchSharedTop5();
      animationId = requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
